<!doctype html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis Word SD Kelas 1</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <style>
      * {
        font-family: "Fredoka", sans-serif;
      }
      .bounce {
        animation: bounce 0.5s ease;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }
      .shake {
        animation: shake 0.4s ease;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }
      .fade-in {
        animation: fadeIn 0.4s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .star-pop {
        animation: starPop 0.6s ease;
      }
      @keyframes starPop {
        0% {
          transform: scale(0) rotate(0deg);
        }
        50% {
          transform: scale(1.3) rotate(180deg);
        }
        100% {
          transform: scale(1) rotate(360deg);
        }
      }
    </style>
    <style>
      body {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body class="h-full">
    <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%)">
      <!-- Start Screen -->
      <div id="start-screen" class="flex flex-col items-center justify-center min-h-full p-6 text-center fade-in">
        <div class="bg-white/90 backdrop-blur rounded-3xl p-8 max-w-md w-full shadow-2xl">
          <div class="text-6xl mb-4">📝✨</div>
          <h1 id="main-title" class="text-2xl font-bold text-purple-700 mb-3">Kuis Tools Microsoft Word</h1>
          <p class="text-gray-600 mb-6 text-lg">Yuk belajar tentang tools di Microsoft Word! Ada 7 soal seru menanti kamu! 🎉</p>
          <button onclick="startQuiz()" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-4 px-8 rounded-2xl text-xl hover:scale-105 transition-transform shadow-lg">Mulai Kuis! 🚀</button>
        </div>
      </div>
      <!-- Quiz Screen -->
      <div id="quiz-screen" class="hidden min-h-full p-4 flex flex-col items-center justify-center">
        <div class="bg-white/90 backdrop-blur rounded-3xl p-6 max-w-lg w-full shadow-2xl fade-in">
          <!-- Progress -->
          <div class="flex items-center justify-between mb-4">
            <span id="q-number" class="text-purple-600 font-bold text-lg">Soal 1/7</span>
            <div class="flex gap-1" id="stars-container"></div>
          </div>
          <div class="w-full bg-purple-100 rounded-full h-3 mb-5">
            <div id="progress-bar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-3 rounded-full transition-all duration-500" style="width: 14%"></div>
          </div>
          <!-- Question -->
          <div id="question-area" class="mb-6"></div>
          <!-- Feedback -->
          <div id="feedback" class="hidden text-center py-3 px-4 rounded-2xl mb-4 font-bold text-lg"></div>
          <!-- Next Button -->
          <button id="next-btn" class="hidden w-full bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold py-3 rounded-2xl text-lg hover:scale-105 transition-transform" onclick="nextQuestion()">Lanjut ➡️</button>
        </div>
      </div>
      <!-- Result Screen -->
      <div id="result-screen" class="hidden min-h-full p-6 flex flex-col items-center justify-center">
        <div class="bg-white/90 backdrop-blur rounded-3xl p-8 max-w-md w-full shadow-2xl text-center fade-in">
          <div id="result-emoji" class="text-7xl mb-4"></div>
          <h2 id="result-title" class="text-2xl font-bold text-purple-700 mb-2"></h2>
          <p id="result-text" class="text-gray-600 text-lg mb-4"></p>
          <div id="result-score" class="text-4xl font-bold text-pink-500 mb-6"></div>
          <button onclick="resetQuiz()" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-4 px-8 rounded-2xl text-xl hover:scale-105 transition-transform shadow-lg">Main Lagi! 🔄</button>
        </div>
      </div>
    </div>
    <script>
      const defaultConfig = {
        quiz_title: "Kuis Tools Microsoft Word",
        font_family: "Fredoka",
        font_size: 16,
        background_color: "#667eea",
        surface_color: "#ffffff",
        text_color: "#6b21a8",
        primary_action_color: "#a855f7",
        secondary_action_color: "#10b981",
      };

      // Quiz Data - varied question types
      const questions = [
        {
          type: "multiple_choice",
          question: "Tools apa yang digunakan untuk memilih <strong>jenis tulisan</strong>? 🔤",
          options: ["Font Size", "Font", "Font Color", "Bullets"],
          correct: 1,
          explanation: "Font digunakan untuk memilih jenis tulisan seperti Calibri atau Comic Sans! ✨",
        },
        {
          type: "true_false",
          question: "Bold digunakan untuk membuat tulisan menjadi <strong>tebal</strong>. Benar atau Salah? 🤔",
          correct: true,
          explanation: "Benar! Bold membuat tulisan jadi tebal seperti ini: <strong>Tebal!</strong> 💪",
        },
        {
          type: "image_match",
          question: "Tulisan ini: <span style='font-style:italic'>Halo Teman!</span><br>Menggunakan style apa? 🎨",
          options: ["Bold (Tebal)", "Italic (Miring)", "Underline (Garis Bawah)"],
          correct: 1,
          explanation: "Italic membuat tulisan menjadi miring! 📐",
        },
        {
          type: "multiple_choice",
          question: "Tools apa yang membuat tulisan menjadi <span style='background:yellow;padding:2px 6px;border-radius:4px'>seperti ini</span>? 🖍️",
          options: ["Font Color", "Text Highlight Color", "Font Size", "Bullets"],
          correct: 1,
          explanation: "Text Highlight Color memberikan warna latar belakang pada tulisan! 🌈",
        },
        {
          type: "drag_sort",
          question: "Tulisan di bawah ini ada di posisi mana?<div class='text-center bg-gray-100 p-4 rounded-xl my-3 border-2 border-dashed border-purple-300'><strong>Selamat Pagi!</strong></div>",
          options: ["Left (Kiri)", "Center (Tengah)", "Right (Kanan)"],
          correct: 1,
          explanation: "Tulisan itu ada di tengah, berarti posisinya Center! 🎯",
        },
        {
          type: "multiple_choice",
          question: "Tools apa yang digunakan untuk mengubah <span style='color:red'>warna tulisan</span> menjadi merah? 🎨",
          options: ["Text Highlight Color", "Font Size", "Font Color", "Posisi"],
          correct: 2,
          explanation: "Font Color mengubah warna tulisannya sendiri! 🌟",
        },
        {
          type: "true_false",
          question: "Bullets digunakan untuk membuat daftar atau list seperti:<br>• Apel<br>• Jeruk<br>• Mangga<br>Benar atau Salah? ✅",
          correct: true,
          explanation: "Benar! Bullets membuat daftar jadi rapi dan mudah dibaca! 📋",
        },
      ];

      let currentQ = 0;
      let score = 0;
      let answered = false;

      function startQuiz() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");
        currentQ = 0;
        score = 0;
        answered = false;
        renderQuestion();
      }

      function renderQuestion() {
        answered = false;
        const q = questions[currentQ];
        document.getElementById("q-number").textContent = `Soal ${currentQ + 1}/7`;
        document.getElementById("progress-bar").style.width = `${((currentQ + 1) / 7) * 100}%`;
        document.getElementById("feedback").classList.add("hidden");
        document.getElementById("next-btn").classList.add("hidden");
        updateStars();

        const area = document.getElementById("question-area");
        let html = `<p class="text-lg font-semibold text-gray-800 mb-4">${q.question}</p>`;

        if (q.type === "multiple_choice" || q.type === "image_match" || q.type === "drag_sort") {
          html += '<div class="grid gap-3">';
          q.options.forEach((opt, i) => {
            html += `<button onclick="selectAnswer(${i})" id="opt-${i}" class="opt-btn text-left p-4 rounded-2xl border-3 border-purple-200 bg-purple-50 hover:bg-purple-100 hover:border-purple-400 transition-all font-medium text-gray-700 text-lg">${getEmoji(i)} ${opt}</button>`;
          });
          html += "</div>";
        } else if (q.type === "true_false") {
          html += '<div class="grid grid-cols-2 gap-4">';
          html += `<button onclick="selectTF(true)" id="tf-true" class="opt-btn p-5 rounded-2xl border-3 border-green-200 bg-green-50 hover:bg-green-100 hover:border-green-400 transition-all font-bold text-green-700 text-xl text-center">✅ Benar</button>`;
          html += `<button onclick="selectTF(false)" id="tf-false" class="opt-btn p-5 rounded-2xl border-3 border-red-200 bg-red-50 hover:bg-red-100 hover:border-red-400 transition-all font-bold text-red-700 text-xl text-center">❌ Salah</button>`;
          html += "</div>";
        }
        area.innerHTML = html;
        area.classList.add("fade-in");
      }

      function getEmoji(i) {
        return ["🅰️", "🅱️", "©️", "🇩"][i] || "•";
      }

      function selectAnswer(i) {
        if (answered) return;
        answered = true;
        const q = questions[currentQ];
        const correct = i === q.correct;
        if (correct) score++;

        // Highlight answers
        document.querySelectorAll(".opt-btn").forEach((btn, idx) => {
          btn.style.pointerEvents = "none";
          if (idx === q.correct) {
            btn.classList.remove("bg-purple-50", "border-purple-200");
            btn.classList.add("bg-green-100", "border-green-500", "bounce");
            btn.innerHTML = "⭐ " + btn.textContent.trim();
          } else if (idx === i && !correct) {
            btn.classList.remove("bg-purple-50", "border-purple-200");
            btn.classList.add("bg-red-100", "border-red-400", "shake");
          }
        });
        showFeedback(correct, q.explanation);
      }

      function selectTF(val) {
        if (answered) return;
        answered = true;
        const q = questions[currentQ];
        const correct = val === q.correct;
        if (correct) score++;

        const trueBtn = document.getElementById("tf-true");
        const falseBtn = document.getElementById("tf-false");
        trueBtn.style.pointerEvents = "none";
        falseBtn.style.pointerEvents = "none";

        if (q.correct === true) {
          trueBtn.classList.add("bg-green-200", "border-green-500", "bounce");
          if (!correct) falseBtn.classList.add("bg-red-200", "border-red-400", "shake");
        } else {
          falseBtn.classList.add("bg-green-200", "border-green-500", "bounce");
          if (!correct) trueBtn.classList.add("bg-red-200", "border-red-400", "shake");
        }
        showFeedback(correct, q.explanation);
      }

      function showFeedback(correct, explanation) {
        const fb = document.getElementById("feedback");
        fb.classList.remove("hidden");
        if (correct) {
          fb.className = "text-center py-3 px-4 rounded-2xl mb-4 font-bold text-lg bg-green-100 text-green-700 fade-in";
          fb.innerHTML = `🎉 Hebat! Benar! <br><span class="font-normal text-base">${explanation}</span>`;
        } else {
          fb.className = "text-center py-3 px-4 rounded-2xl mb-4 font-bold text-lg bg-orange-100 text-orange-700 fade-in";
          fb.innerHTML = `😊 Belum tepat! <br><span class="font-normal text-base">${explanation}</span>`;
        }
        document.getElementById("next-btn").classList.remove("hidden");
        document.getElementById("next-btn").textContent = currentQ < 6 ? "Lanjut ➡️" : "Lihat Hasil! 🏆";
      }

      function nextQuestion() {
        currentQ++;
        if (currentQ >= 7) {
          showResult();
        } else {
          renderQuestion();
        }
      }

      function updateStars() {
        const container = document.getElementById("stars-container");
        let html = "";
        for (let i = 0; i < score; i++) {
          html += '<span class="text-yellow-400 text-xl star-pop">⭐</span>';
        }
        container.innerHTML = html;
      }

      function showResult() {
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");

        const pct = Math.round((score / 7) * 100);
        let emoji, title, text;
        if (score >= 6) {
          emoji = "🏆🌟";
          title = "Luar Biasa!";
          text = "Kamu sudah sangat paham tools Microsoft Word!";
        } else if (score >= 4) {
          emoji = "😊👍";
          title = "Bagus Sekali!";
          text = "Kamu sudah cukup paham, terus belajar ya!";
        } else {
          emoji = "💪📚";
          title = "Semangat!";
          text = "Yuk belajar lagi supaya makin jago!";
        }

        document.getElementById("result-emoji").textContent = emoji;
        document.getElementById("result-title").textContent = title;
        document.getElementById("result-text").textContent = text;
        document.getElementById("result-score").textContent = `${score}/7 Benar (${pct}%)`;
      }

      function resetQuiz() {
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("start-screen").classList.remove("hidden");
      }

      lucide.createIcons();
    </script>
  </body>
</html>
